name: CI

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          find scripts adapters backends -type f -name "*.sh" -print0 | xargs -0 -r shellcheck

      - name: Bash syntax checks
        run: |
          bash -n scripts/*.sh adapters/wordpress/*.sh backends/*/upload.sh

      - name: Anti-hardcoding runtime guard
        run: |
          if grep -RInE 'tbsoftwash|localhost:8081|ChangeThisNow_123' scripts adapters backends; then
            echo "Found banned hardcoded runtime token(s)" >&2
            exit 1
          fi

      - name: Docs link consistency check
        run: |
          bash scripts/check_docs_links.sh

      - name: Env validation matrix (non-destructive)
        run: |
          bash scripts/validate_env_matrix_ci.sh
